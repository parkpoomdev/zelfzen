<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot-Cross Zen - Privacy Meditation</title>
    <link rel="icon" type="image/png" href="Gemini_Generated_Image_gux89ggux89ggux8.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="main-container">

        <!-- Settings Panel -->
        <div id="settings-panel">
            <div class="setting-group">
                <label class="setting-label">Meditation Mode:</label>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="balance">Balance (5-5)</button>
                    <button class="mode-btn" data-mode="relax">Relax (4-6)</button>
                    <button class="mode-btn" data-mode="box">Box (4-4-4-4)</button>
                    <button class="mode-btn" data-mode="zen">Zen</button>

                </div>
            </div>
            <div class="setting-group">
                <label class="setting-label">Duration (min):</label>
                <input type="number" id="durationInput" min="1" max="60" value="10" style="width: 50px;">
            </div>
            <div class="setting-group">
                <label class="setting-label">Volume:</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" style="width: 100px;">
                <span id="volumeLabel">50%</span>
            </div>
        </div>

        <!-- Preview Modal -->
        <div id="preview-modal">
            <div class="preview-container">
                <h2 id="previewTitle" style="margin-bottom: 10px;">BREATHING GUIDE</h2>
                <div class="preview-canvas">
                    <div class="preview-guide" id="previewGuide">
                        <div class="preview-breathing"></div>
                    </div>
                </div>
                <div class="preview-info">
                    <h3>How it works:</h3>
                    <p id="previewDescription"></p>
                </div>
                <div class="preview-buttons">
                    <button id="previewPlaySound">🔊 Preview Sound</button>
                    <button id="previewCancel">Back</button>
                    <button id="previewStart" style="background: #00ff9d; color: #000;">Start Session</button>
                </div>
            </div>
        </div>

        <!-- Session Info Modal -->
        <div id="session-info-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
            <div style="background:#111;border:2px solid #00ff9d;border-radius:10px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                    <h2 style="color:#00ff9d;margin:0;font-size:20px;text-transform:uppercase;">Session Log</h2>
                    <button id="sessionInfoClose" style="background:#000;border:2px solid #ff5555;color:#ff5555;padding:5px 15px;cursor:pointer;font-family:inherit;font-weight:bold;">✕ Close</button>
                </div>
                <div id="session-info-content">
                    <div style="color:#00ff9d;text-align:center;padding:40px;">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Countdown Overlay -->
        <div id="countdown-overlay" style="pointer-events:none;">
            <div class="countdown-number" id="countdownNumber">3</div>
        </div>


        <div id="game-container">
            <canvas id="pixelCanvas"></canvas>
            <div class="scanlines"></div>

            <!-- Breathing Guide Circle -->
            <div id="breathing-guide"></div>

            <!-- Tempo Box -->
            <div id="tempo-box"></div>

            <!-- Breath Indicator -->
            <div id="breath-indicator">Inhale</div>


            <!-- Pause Menu -->
            <div id="pause-menu" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);padding:20px;border-radius:10px;border:2px solid #00ff9d;z-index:30;min-width:250px;">
                <div style="text-align:center;color:#00ff9d;font-size:16px;font-weight:bold;margin-bottom:15px;text-transform:uppercase;">Session Paused</div>
                <div id="pause-menu-options" style="display:flex;flex-direction:column;gap:8px;"></div>
                <div style="text-align:center;color:#888;font-size:10px;margin-top:15px;">↑↓ Select · Enter Confirm</div>
            </div>

            <div id="ui-layer">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="hud-text" id="modeDisplay">ZEN_MODE</span>
                    <div class="recording-dot" id="recDot"></div>
                </div>
                <div style="text-align: center;">
                    <span id="timer" class="hud-text" style="font-size: 2em;">10:00</span>
                </div>
                <div style="text-align: right;">
                    <span class="hud-text">PRIVACY: ON</span>
                </div>
            </div>
        </div>



        <!-- Filter Color and Time Progress Panel -->
        <div id="filter-timeline-panel" style="display: flex; align-items: center; justify-content: center; gap: 18px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="color: #00ff9d; font-size: 11px; text-transform: uppercase; font-weight: bold; font-family: 'Courier New', monospace;">Filter Colors:</span>
                <div id="palette-selector" style="display: flex; gap: 6px;">
                    <span class="rec-dot-top palette-dot" data-palette="classic" aria-label="Classic" aria-pressed="true"></span>
                    <span class="rec-dot-top palette-dot" data-palette="matrix" aria-label="Matrix" aria-pressed="false"></span>
                    <span class="rec-dot-top palette-dot" data-palette="retro" aria-label="Retro" aria-pressed="false"></span>
                    <span class="rec-dot-top palette-dot" data-palette="inverted" aria-label="Inverted" aria-pressed="false"></span>
                </div>
            </div>
            <div id="rec-progress-bar"
                style="flex:1; height: 8px; background: #222; border-radius: 4px; min-width: 180px; max-width: 300px; overflow: hidden;">
                <div id="rec-progress"
                    style="height: 100%; width: 0%; background: linear-gradient(90deg, #00ff9d, #00b36b); transition: width 0.2s;">
                </div>
            </div>
            <span id="rec-timer-top"
                style="font-family: inherit; font-size: 1em; color: #00ff9d; min-width: 48px; text-align: right;">10:00</span>
        </div>



        <div id="controls">
            <button id="btnToggle">Start Meditation</button>
            <button id="btnDownload" disabled>Download Video</button>
        </div>




    </div>

    <!-- GIF Grid (Session Gallery) - now outside main-container -->

    <div style="display: flex; justify-content: center; margin-top: 24px;">
        <button id="deleteAllSessions" style="display:none;background:#ff5555;color:#fff;border:2px solid #ff5555;padding:8px 24px;font-weight:bold;cursor:pointer;border-radius:6px;">Delete All Sessions</button>
    </div>
    <div id="gif-grid"
        style="display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; margin-top: 16px;"></div>

    <video id="webcamVideo" autoplay playsinline style="display:none;"></video>

    <script src="audio.js"></script>
    <script src="script.js"></script>
</body>

</html>
