<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Zen - Privacy Meditation</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ff9d;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Main container */
        #main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Mode selector and settings */
        #settings-panel {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ff9d;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .setting-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .setting-label {
            color: #00ff9d;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Mode toggle buttons */
        .mode-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            background: #000;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            padding: 8px 15px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            transition: all 0.3s;
        }

        .mode-btn:hover {
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }

        .mode-btn.active {
            background: #00ff9d;
            color: #000;
            box-shadow: 0 0 15px #00ff9d;
        }

        input[type="range"], input[type="number"] {
            background: #000;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 5px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }

        /* Preview Modal */
        #preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #preview-modal.show {
            display: flex;
        }

        .preview-container {
            text-align: center;
            color: #00ff9d;
        }

        .preview-canvas {
            width: 200px;
            height: 200px;
            border: 3px solid #00ff9d;
            background: #111;
            margin: 20px auto;
            position: relative;
        }

        .preview-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .preview-breathing {
            width: 40px;
            height: 40px;
            border: 2px solid #00ff9d;
            border-radius: 50%;
            animation: breathe 8s infinite;
        }

        .preview-tempobox {
            width: 50px;
            height: 50px;
            border: 2px solid #00ff9d;
            animation: tempo-pulse 6s infinite;
        }

        .preview-info {
            margin-top: 20px;
            max-width: 400px;
        }

        .preview-info h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        .preview-info p {
            margin: 5px 0;
            font-size: 12px;
            color: #00cc7a;
        }

        .preview-buttons {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .preview-buttons button {
            background: #000;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            padding: 10px 25px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .preview-buttons button:hover {
            background: #00ff9d;
            color: #000;
            box-shadow: 0 0 15px #00ff9d;
        }

        /* Countdown timer */
        #countdown-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #countdown-overlay.show {
            display: flex;
        }

        .countdown-number {
            font-size: 120px;
            color: #00ff9d;
            font-weight: bold;
            text-shadow: 0 0 20px #00ff9d;
            animation: countdown-pop 0.5s ease-out;
        }

        @keyframes countdown-pop {
            0% {
                transform: scale(0.3);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        /* Breath indicator */
        #breath-indicator {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #00ff9d;
            background: rgba(0, 0, 0, 0.7);
            padding: 3px 8px;
            border-radius: 3px;
            min-width: 80px;
            text-align: center;
        }

        /* Container for the game view */
        #game-container {
            position: relative;
            width: 320px; /* Base size */
            height: 320px;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
            image-rendering: pixelated; /* Critical for sharp pixels */
        }

        /* Breathing Guide Circle */
        #breathing-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 255, 157, 0.4);
            border-radius: 50%;
            display: none;
            z-index: 5;
        }

        #breathing-guide.active {
            display: block;
            animation: breathe 8s infinite;
        }

        @keyframes breathe {
            0%, 100% {
                width: 60px;
                height: 60px;
                border-color: rgba(0, 255, 157, 0.2);
            }
            25% {
                width: 120px;
                height: 120px;
                border-color: rgba(0, 255, 157, 0.6);
            }
            50% {
                width: 140px;
                height: 140px;
                border-color: rgba(0, 255, 157, 0.4);
            }
            75% {
                width: 80px;
                height: 80px;
                border-color: rgba(0, 255, 157, 0.3);
            }
        }

        /* Tempo Box Meditation - Grid Pattern */
        #tempo-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border: 3px solid rgba(0, 255, 157, 0.4);
            display: none;
            z-index: 5;
        }

        #tempo-box.active {
            display: block;
            animation: tempo-pulse 6s infinite;
        }

        @keyframes tempo-pulse {
            0% {
                width: 80px;
                height: 80px;
                border-color: rgba(0, 255, 157, 0.2);
                box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.4);
            }
            25% {
                border-color: rgba(0, 255, 157, 0.8);
                box-shadow: 0 0 20px 10px rgba(0, 255, 157, 0.3);
            }
            50% {
                width: 100px;
                height: 100px;
                border-color: rgba(0, 255, 157, 0.6);
                box-shadow: 0 0 30px 15px rgba(0, 255, 157, 0.2);
            }
            75% {
                border-color: rgba(0, 255, 157, 0.4);
            }
            100% {
                width: 80px;
                height: 80px;
                border-color: rgba(0, 255, 157, 0.2);
                box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.4);
            }
        }

        /* The canvas showing the pixel art video */
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: none; /* Let clicks pass through to controls if needed */
        }

        .hud-text {
            text-shadow: 1px 1px 0 #000;
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
            border-radius: 4px;
        }

        /* Controls Area */
        #controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        button {
            background: #000;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover {
            background: #00ff9d;
            color: #000;
            box-shadow: 0 0 10px #00ff9d;
        }

        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .recording-dot {
            height: 15px;
            width: 15px;
            background-color: red;
            border-radius: 50%;
            display: none;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Scanline effect for retro feel */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <!-- Settings Panel -->
        <div id="settings-panel">
            <div class="setting-group">
                <label class="setting-label">Meditation Mode:</label>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="breathing">Breathing Guide</button>
                    <button class="mode-btn" data-mode="tempobox">Tempo Box</button>
                    <button class="mode-btn" data-mode="silent">Silent Zen</button>
                </div>
            </div>
            <div class="setting-group">
                <label class="setting-label">Duration (min):</label>
                <input type="number" id="durationInput" min="1" max="60" value="10" style="width: 50px;">
            </div>
            <div class="setting-group">
                <label class="setting-label">Volume:</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" style="width: 100px;">
                <span id="volumeLabel">50%</span>
            </div>
        </div>

        <!-- Preview Modal -->
        <div id="preview-modal">
            <div class="preview-container">
                <h2 id="previewTitle" style="margin-bottom: 10px;">BREATHING GUIDE</h2>
                <div class="preview-canvas">
                    <div class="preview-guide" id="previewGuide">
                        <div class="preview-breathing"></div>
                    </div>
                </div>
                <div class="preview-info">
                    <h3>How it works:</h3>
                    <p id="previewDescription"></p>
                </div>
                <div class="preview-buttons">
                    <button id="previewPlaySound">🔊 Preview Sound</button>
                    <button id="previewCancel">Back</button>
                    <button id="previewStart" style="background: #00ff9d; color: #000;">Start Session</button>
                </div>
            </div>
        </div>

        <!-- Countdown Overlay -->
        <div id="countdown-overlay">
            <div class="countdown-number" id="countdownNumber">3</div>
        </div>

        <div id="game-container">
            <canvas id="pixelCanvas"></canvas>
            <div class="scanlines"></div>
            
            <!-- Breathing Guide Circle -->
            <div id="breathing-guide"></div>
            
            <!-- Tempo Box -->
            <div id="tempo-box"></div>

            <!-- Breath Indicator -->
            <div id="breath-indicator">Inhale</div>
            
            <div id="ui-layer">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="hud-text" id="modeDisplay">ZEN_MODE</span>
                    <div class="recording-dot" id="recDot"></div>
                </div>
                <div style="text-align: center;">
                    <span id="timer" class="hud-text" style="font-size: 2em;">10:00</span>
                </div>
                <div style="text-align: right;">
                    <span class="hud-text">PRIVACY: ON</span>
                </div>
            </div>
        </div>

        <div id="controls">
            <button id="btnToggle">Start Meditation</button>
            <button id="btnDownload" disabled>Download Video</button>
        </div>
    </div>

    <video id="webcamVideo" autoplay playsinline style="display:none;"></video>

    <script>
        // CONFIGURATION
        const PIXEL_SIZE = 12;
        const CANVAS_SIZE = 320;
        
        // DOM Elements
        const video = document.getElementById('webcamVideo');
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const btnToggle = document.getElementById('btnToggle');
        const btnDownload = document.getElementById('btnDownload');
        const timerDisplay = document.getElementById('timer');
        const recDot = document.getElementById('recDot');
        const durationInput = document.getElementById('durationInput');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeLabel = document.getElementById('volumeLabel');
        const modeDisplay = document.getElementById('modeDisplay');
        const breathingGuide = document.getElementById('breathing-guide');
        const tempoBox = document.getElementById('tempo-box');
        const settingsPanel = document.getElementById('settings-panel');
        const previewModal = document.getElementById('preview-modal');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const breathIndicator = document.getElementById('breath-indicator');
        const modeButtons = document.querySelectorAll('.mode-btn');

        // State
        let isMeditating = false;
        let isCountingDown = false;
        let animationId;
        let mediaRecorder;
        let recordedChunks = [];
        let timerInterval;
        let timeLeft = 600;
        let meditationMode = 'breathing';
        let audioContext;
        let oscillator;
        let gainNode;
        let isAudioPlaying = false;
        let breathPhase = 'inhale'; // inhale, hold, exhale
        let breathCounter = 0;
        let cameraReady = false;
        let countdownValue = 0;

        // Mode descriptions
        const modeDescriptions = {
            'breathing': 'Follow the expanding and contracting circle. Breathe in as it expands, hold, then exhale as it contracts. Duration: 8 seconds per cycle.',
            'tempobox': 'Track the pulsing square box. Breathe with the rhythm of the pulse. Quick tempo helps maintain focus. Duration: 6 seconds per cycle.',
            'silent': 'No visual guide or sound. Pure silent meditation. Focus on your natural breathing rhythm.'
        };

        // Initialize Canvas
        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;
        ctx.imageSmoothingEnabled = false;

        // Initialize Audio Context
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Create beep sound with specific pitch and duration
        function playBeep(frequency = 800, duration = 100, volume = 0.3, type = 'sine') {
            initAudioContext();
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.type = type;
            osc.frequency.value = frequency;
            
            gain.gain.setValueAtTime(volume * (volumeSlider.value / 100), audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration / 1000);
        }

        // Create countdown beep (ascending pitch for anticipation)
        function playCountdownBeep(number) {
            const baseFreq = 600;
            const freq = baseFreq + (number * 100);
            playBeep(freq, 150, 0.4);
        }

        // Create breath stage beep
        function playBreathBeep(stage) {
            if (stage === 'transition') {
                // Double beep for transition
                playBeep(900, 100, 0.3);
                setTimeout(() => playBeep(900, 100, 0.3), 150);
            } else if (stage === 'inhale') {
                playBeep(600, 80, 0.25);
            } else if (stage === 'exhale') {
                playBeep(500, 100, 0.25);
            }
        }

        // Setup Camera on page load
        async function setupCamera() {
            if (cameraReady) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    cameraReady = true;
                    console.log('Camera ready');
                };
            } catch (err) {
                console.log("Camera access denied or not available");
            }
        }

        // Initialize camera on page load
        window.addEventListener('load', () => {
            setupCamera();
            draw(); // Start the continuous draw loop
        });

        // Mode button handlers
        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                modeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                meditationMode = btn.dataset.mode;
                showPreviewModal();
            });
        });

        // Show preview modal
        function showPreviewModal() {
            const titles = {
                'breathing': 'BREATHING GUIDE',
                'tempobox': 'TEMPO BOX',
                'silent': 'SILENT ZEN'
            };
            
            document.getElementById('previewTitle').textContent = titles[meditationMode];
            document.getElementById('previewDescription').textContent = modeDescriptions[meditationMode];
            
            const previewGuide = document.getElementById('previewGuide');
            previewGuide.innerHTML = meditationMode === 'breathing' 
                ? '<div class="preview-breathing"></div>'
                : '<div class="preview-tempobox"></div>';
            
            previewModal.classList.add('show');
        }

        // Preview sound button
        document.getElementById('previewPlaySound').addEventListener('click', () => {
            if (meditationMode === 'silent') {
                alert('Silent mode has no sound');
                return;
            }
            // Play a quick preview of the meditation sound
            playBeep(50, 500, 0.2);
            setTimeout(() => playBeep(50, 200, 0.15), 600);
        });

        // Preview cancel
        document.getElementById('previewCancel').addEventListener('click', () => {
            previewModal.classList.remove('show');
            // Ensure camera preview continues
            if (!isMeditating) {
                draw();
            }
        });

        // Preview start
        document.getElementById('previewStart').addEventListener('click', () => {
            previewModal.classList.remove('show');
            startCountdown();
        });

        // Countdown before meditation
        function startCountdown() {
            let count = 5;
            isCountingDown = true;
            countdownOverlay.classList.add('show');
            
            const countdown = setInterval(() => {
                countdownValue = count;
                playCountdownBeep(count);
                count--;
                
                if (count < 0) {
                    clearInterval(countdown);
                    isCountingDown = false;
                    countdownValue = 0;
                    countdownOverlay.classList.remove('show');
                    startMeditation();
                }
            }, 1000);
        }

        // Volume slider
        volumeSlider.addEventListener('input', (e) => {
            volumeLabel.textContent = e.target.value + '%';
        });

        // Duration input
        durationInput.addEventListener('change', (e) => {
            let minutes = parseInt(e.target.value);
            if (minutes < 1) minutes = 1;
            if (minutes > 60) minutes = 60;
            e.target.value = minutes;
            // Update display if not meditating
            if (!isMeditating && !isCountingDown) {
                timeLeft = minutes * 60;
                updateTimer();
            }
        });

        // Duration input on input (live update)
        durationInput.addEventListener('input', (e) => {
            let minutes = parseInt(e.target.value);
            if (minutes >= 1 && minutes <= 60 && !isMeditating && !isCountingDown) {
                timeLeft = minutes * 60;
                updateTimer();
            }
        });

        // Pixelation draw loop - continuous
        function draw() {
            // Always show pixelated camera feed
            if (cameraReady && video.srcObject && video.readyState === video.HAVE_ENOUGH_DATA) {
                const w = canvas.width / PIXEL_SIZE;
                const h = canvas.height / PIXEL_SIZE;
                
                // Draw from video to small buffer
                ctx.drawImage(video, 0, 0, w, h);
                
                // Scale back up with pixelation effect
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(canvas, 0, 0, w, h, 0, 0, canvas.width, canvas.height);
                ctx.imageSmoothingEnabled = false;
            } else {
                // Show placeholder when camera not ready
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff9d';
                ctx.font = '12px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('Waiting for camera...', canvas.width / 2, canvas.height / 2);
            }

            // Show countdown timer on canvas during countdown
            if (isCountingDown && countdownValue > 0) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff9d';
                ctx.font = 'bold 120px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#00ff9d';
                ctx.shadowBlur = 20;
                ctx.fillText(countdownValue, canvas.width / 2, canvas.height / 2);
                ctx.shadowBlur = 0;
            }

            // Show grid lines only during meditation
            if (isMeditating) {
                ctx.strokeStyle = 'rgba(0, 255, 157, 0.1)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let x = 0; x <= canvas.width; x += PIXEL_SIZE) {
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                }
                for (let y = 0; y <= canvas.height; y += PIXEL_SIZE) {
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                }
                ctx.stroke();
            }

            animationId = requestAnimationFrame(draw);
        }

        // Track last beep times to avoid duplicate beeps
        let lastBreathBeepTime = 0;

        // Respiratory rhythm with breath stage indicators
        function manageBreathRhythm() {
            if (!isMeditating) return;

            const currentTime = Date.now();

            if (meditationMode === 'breathing') {
                // 8-second cycle: 4s inhale, 4s exhale
                const cycleTime = 8000;
                const elapsed = (Date.now() % cycleTime);
                
                if (elapsed < 4000) {
                    breathPhase = 'inhale';
                    breathCounter = Math.ceil((4000 - (elapsed % 4000)) / 1000);
                    breathIndicator.textContent = `INHALE (${breathCounter}s)`;
                } else {
                    breathPhase = 'exhale';
                    breathCounter = Math.ceil((8000 - elapsed) / 1000);
                    breathIndicator.textContent = `EXHALE (${breathCounter}s)`;
                }

                // Play beeps at 2s and 1s for each cycle
                const secondsInCycle = (elapsed / 1000) % 8;
                if (secondsInCycle >= 4 && secondsInCycle <= 8) {
                    const countdownInExhale = (8 - Math.floor(secondsInCycle));
                    if (countdownInExhale === 2 && currentTime - lastBreathBeepTime > 900) {
                        playBeep(700, 120, 0.35);
                        lastBreathBeepTime = currentTime;
                    } else if (countdownInExhale === 1 && currentTime - lastBreathBeepTime > 900) {
                        playBeep(800, 150, 0.35);
                        lastBreathBeepTime = currentTime;
                    }
                }
            } else if (meditationMode === 'tempobox') {
                // 6-second tempo cycle with countdown
                const cycleTime = 6000;
                const elapsed = (Date.now() % cycleTime);
                const remaining = Math.ceil((6000 - elapsed) / 1000);
                
                if (remaining <= 2) {
                    breathIndicator.textContent = `READY (${remaining}s)`;
                } else {
                    breathIndicator.textContent = `BREATHE (${remaining}s)`;
                }

                // Play beeps at 2s and 1s for each tempo cycle
                const secondsInCycle = (elapsed / 1000) % 6;
                if (secondsInCycle >= 4 && secondsInCycle <= 6) {
                    const countdownInTempo = (6 - Math.floor(secondsInCycle));
                    if (countdownInTempo === 2 && currentTime - lastBreathBeepTime > 900) {
                        playBeep(700, 120, 0.35);
                        lastBreathBeepTime = currentTime;
                    } else if (countdownInTempo === 1 && currentTime - lastBreathBeepTime > 900) {
                        playBeep(800, 150, 0.35);
                        lastBreathBeepTime = currentTime;
                    }
                }
            } else {
                breathIndicator.textContent = 'MEDITATION';
            }
        }

        // Recording
        function startRecording() {
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                btnDownload.disabled = false;
                btnDownload.onclick = () => {
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'pixel_meditation_session.webm';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                };
            };

            mediaRecorder.start();
            recDot.style.display = 'block';
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            recDot.style.display = 'none';
        }

        // Timer
        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft > 0) {
                timeLeft--;
            } else {
                stopMeditation();
            }
        }

        // Update visual guide
        function updateVisualGuide() {
            breathingGuide.classList.remove('active');
            tempoBox.classList.remove('active');
            
            if (isMeditating) {
                if (meditationMode === 'breathing') {
                    breathingGuide.classList.add('active');
                } else if (meditationMode === 'tempobox') {
                    tempoBox.classList.add('active');
                }
            }
        }

        // Start meditation (after countdown)
        async function startMeditation() {
            // Ensure camera is ready
            if (!cameraReady) {
                await setupCamera();
            }

            isMeditating = true;
            const duration = parseInt(durationInput.value);
            timeLeft = duration * 60;
            recordedChunks = [];
            btnDownload.disabled = true;
            btnToggle.textContent = "Stop Session";
            btnToggle.style.borderColor = "#ff5555";
            btnToggle.style.color = "#ff5555";
            settingsPanel.style.opacity = "0.5";
            settingsPanel.style.pointerEvents = "none";
            
            lastBreathBeepTime = 0; // Reset beep timer
            updateVisualGuide();
            updateModeDisplay();
            draw();
            startRecording();
            
            if (meditationMode !== 'silent') {
                startMeditationSound();
            }
            
            timerInterval = setInterval(updateTimer, 1000);
            const breathRhythmInterval = setInterval(manageBreathRhythm, 100);
            updateTimer();
            
            // Store interval ID for cleanup
            btnToggle.breathRhythmInterval = breathRhythmInterval;
        }

        // Stop meditation
        function stopMeditation() {
            isMeditating = false;
            isCountingDown = false;
            countdownValue = 0;
            cancelAnimationFrame(animationId);
            clearInterval(timerInterval);
            if (btnToggle.breathRhythmInterval) {
                clearInterval(btnToggle.breathRhythmInterval);
            }
            stopRecording();
            stopMeditationSound();
            
            // Don't stop camera - keep it running for welcome page
            
            btnToggle.textContent = "Start Meditation";
            btnToggle.style.borderColor = "#00ff9d";
            btnToggle.style.color = "#00ff9d";
            settingsPanel.style.opacity = "1";
            settingsPanel.style.pointerEvents = "auto";
            
            previewModal.classList.remove('show');
            countdownOverlay.classList.remove('show');
            
            breathingGuide.classList.remove('active');
            tempoBox.classList.remove('active');
            breathIndicator.textContent = 'Ready';
            
            // Reset timer display
            const duration = parseInt(durationInput.value);
            timeLeft = duration * 60;
            updateTimer();
            
            // Restart draw loop to show camera preview
            draw();
        }

        // Main button handler
        btnToggle.addEventListener('click', () => {
            if (!isMeditating) {
                showPreviewModal();
            } else {
                stopMeditation();
            }
        });

        // Start meditation sound (ambient)
        function startMeditationSound() {
            if (isAudioPlaying) return;
            
            initAudioContext();
            
            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.value = 40; // Very low frequency
            
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.08 * (volumeSlider.value / 100), audioContext.currentTime + 1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start(audioContext.currentTime);
            
            isAudioPlaying = true;
        }

        // Stop meditation sound
        function stopMeditationSound() {
            if (!isAudioPlaying || !oscillator) return;
            
            gainNode.gain.setValueAtTime(gainNode.gain.value, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.5);
            oscillator.stop(audioContext.currentTime + 0.5);
            isAudioPlaying = false;
        }

        // Update mode display
        function updateModeDisplay() {
            const modes = {
                'breathing': 'BREATHING_GUIDE',
                'tempobox': 'TEMPO_BOX',
                'silent': 'SILENT_ZEN'
            };
            modeDisplay.textContent = modes[meditationMode];
        }

        // Initialize
        updateModeDisplay();
    </script>
</body>
</html>
